		body
		{font-family:'Georgia', serif;
		margin:0;

		header
		{background:linear-gradient(to right, #6b4a2f, #8b6a45, #5b3d28);
		color:white;
		padding:40px 20px;
		text-align:center;
		position:relative;}

		.sa-flag
		{position:absolute;
		top:20px;
		right:20px;
		width:50px;}

		.container
		{max-width:1100px;
		margin:auto;
		padding:30px 20px;}

		h1
		{color:#fff;
		font-size:48px;
		margin-bottom:10px;}

		h2
		{color:#5b3d28;
		font-size:36px;
		margin-top:50px;}

		.section-title 
		{font-size: 34px;
		font-weight: bold;
		text-align: center;
		margin: 60px 0 25px;
		color: #5b3d28;
		letter-spacing: 2px;
		text-transform: uppercase;
		position: relative;}

		.section-title::after 
		{content: "";
		display: block;
		width: 120px;
		height: 4px;
		background: linear-gradient(to right, #6b4a2f, #8b6a45, #5b3d28);
		margin: 12px auto 0;
		border-radius: 2px;}

		.section-title.small 
		{font-size: 22px;
		margin: 35px 0 15px;
		letter-spacing: 1px;}

		.section-title.small::after 
		{ width: 70px;
		height: 3px;}

		.gallery-container 
		{display: grid;
		grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
		gap: 15px;
		padding: 40px 20px;
		max-width: 1200px;
		margin: auto;}

		.gallery-container img 
		{width: 100%;
		border-radius: 10px;
		cursor: pointer;
		transition: transform 0.2s ease;
		box-shadow: 2px 4px 12px rgba(0,0,0,0.15);}

		.gallery-container img:hover 
		{transform: scale(1.03);}

		.lightbox 
		{position: fixed;
		top: 0; left: 0;
		width: 100%;
		height: 100%;
		background: rgba(0,0,0,0.85);
		display: none;
		align-items: center;
		justify-content: center;
		z-index: 9999;}

		.lightbox img 
		{max-width: 90%;
		max-height: 90%;
		border: 4px solid white;
		border-radius: 8px;}

		.lightbox:target 
		{display: flex;}

		.back-home
		{display:inline-block;
		margin:40px auto 0;
		padding:12px 20px;
		text-align:center;
		background-color:#8b6a45;
		color:white;
		border-radius:5px;
		text-decoration:none;}

		.contact-section
		{margin-top:60px;
		text-align:center;
		background-color:#ede3d1;
		padding:40px;
		border-radius:12px;}

		.contact-section p
		{margin-bottom:10px;
		font-size:18px;}

		footer
		{background-color:#5b3d28;
		color:white;
		text-align:center;
		padding:30px 20px;
		margin-top:60px;}

		.menu-toggle
		{font-size:30px;
		color:white;
		background:none;
		border:none;
		cursor:pointer;
		position:fixed;
		top:20px;
		left:20px;
		z-index:1000;}

		.menu
		{display:none;
		flex-direction:column;
		position:fixed;
		top:60px;
		left:0;
		width:100%;
		background-color:rgba(0,0,0,0.95);
		padding:30px 0;
		text-align:center;
		z-index:999;}

		.menu a
		{color:white;
		text-decoration:none;
		padding:15px 0;
		font-size:20px;
		display:block;}

		.menu a:hover
		{background-color:rgba(255,255,255,0.1);}

		@media(max-width:768px){
		.package
		{padding:20px;}
		h1{font-size:36px;}}

</style>
